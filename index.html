<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>coming soon...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:    #ff6eb4;
      --hotpink: #ff2d78;
      --lilac:   #d8aaff;
      --soft:    #ffe6f5;
      --dark:    #1a0828;
      --cyan:    #7fffd4;
      --yellow:  #fff176;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--soft);
      font-family: 'DotGothic16', monospace;
      overflow: hidden;
      cursor: crosshair;
    }

    /* scrolling bg text */
    .bg-marquee {
      position: fixed;
      inset: 0;
      overflow: hidden;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
      display: flex;
      flex-direction: column;
    }
    .bg-marquee span {
      font-family: 'DotGothic16', monospace;
      font-size: 1.1rem;
      white-space: nowrap;
      color: var(--pink);
      animation: scroll-left 18s linear infinite;
      line-height: 1.6;
    }
    .bg-marquee span:nth-child(even) {
      animation-direction: reverse;
      animation-duration: 22s;
      color: var(--lilac);
    }
    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 100;
    }

    /* vignette */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10,0,20,0.85) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* center stage */
    .stage {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.6rem;
    }

    .hearts-row {
      font-size: 1.1rem;
      letter-spacing: 0.5em;
      color: var(--pink);
      opacity: 0;
      animation: heartbeat 1.4s 0.3s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1);    opacity: 0.7; }
      50%      { transform: scale(1.15); opacity: 1;   }
    }

    .label {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0;
      text-shadow: 0 0 8px var(--cyan);
      animation: fadeIn 0.5s 0.6s ease forwards;
    }

    .title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 10vw, 7rem);
      line-height: 1;
      text-align: center;
      color: var(--soft);
      text-shadow: 0 0 10px var(--pink), 0 0 30px var(--hotpink), 3px 3px 0 var(--hotpink), 6px 6px 0 rgba(255,45,120,0.3);
      opacity: 0;
      position: relative;
      animation: title-appear 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.9s forwards, glitch 8s 2s infinite;
    }
    .title::before, .title::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      text-align: center;
    }
    .title::before {
      color: var(--cyan); text-shadow: none;
      animation: glitch-top 8s 2s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      opacity: 0;
    }
    .title::after {
      color: var(--hotpink); text-shadow: none;
      animation: glitch-bot 8s 2s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      opacity: 0;
    }

    @keyframes title-appear {
      from { opacity: 0; transform: scale(0.7) rotate(-3deg); filter: blur(10px); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg);  filter: blur(0);    }
    }
    @keyframes glitch {
      0%,90%,100% { transform: translate(0); }
      92% { transform: translate(-3px,  1px); }
      94% { transform: translate( 3px, -1px); }
      96% { transform: translate(-2px,  2px); }
      98% { transform: translate( 2px, -2px); }
    }
    @keyframes glitch-top {
      0%,89%,100% { opacity: 0; transform: translate(0); }
      90% { opacity: 0.7; transform: translate(-4px,-2px); }
      93% { opacity: 0.5; transform: translate( 4px, 0);  }
      96% { opacity: 0; }
    }
    @keyframes glitch-bot {
      0%,91%,100% { opacity: 0; transform: translate(0); }
      92% { opacity: 0.6; transform: translate( 4px, 2px); }
      95% { opacity: 0.4; transform: translate(-4px, 0);   }
      97% { opacity: 0; }
    }

    /* loading bar */
    .loading-wrap {
      margin-top: 1.4rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 0.5s 1.6s ease forwards;
    }
    .loading-label {
      font-size: 0.7rem; letter-spacing: 0.3em;
      color: var(--lilac); text-shadow: 0 0 6px var(--lilac);
    }
    .loading-label .dots::after {
      content: '';
      animation: dotdotdot 1.5s steps(4, end) infinite;
    }
    @keyframes dotdotdot {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
    .bar-outer {
      width: 220px; height: 10px;
      border: 2px solid var(--pink);
      border-radius: 999px; overflow: hidden;
      box-shadow: 0 0 10px var(--pink), inset 0 0 4px rgba(255,110,180,0.2);
    }
    .bar-inner {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--lilac), var(--cyan));
      border-radius: 999px;
      box-shadow: 0 0 8px var(--pink);
      animation: load-fill 6s cubic-bezier(0.4,0,0.6,1) 1.8s forwards;
    }
    @keyframes load-fill {
      0%   { width: 0%; }
      30%  { width: 35%; }
      55%  { width: 52%; }
      70%  { width: 68%; }
      85%  { width: 85%; }
      100% { width: 92%; }
    }

    /* bottom notice */
    .notice {
      position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; letter-spacing: 0.2em;
      color: rgba(216,170,255,0.4); white-space: nowrap; z-index: 10;
      animation: blink 3s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 0.9; }
    }

    /* corner decorations */
    .corner {
      position: fixed; font-size: 0.65rem;
      color: rgba(255,110,180,0.35); letter-spacing: 0.1em;
      z-index: 10; font-family: 'DotGothic16', monospace; line-height: 1.6;
    }
    .corner.tl { top: 1rem;    left: 1rem; }
    .corner.tr { top: 1rem;    right: 1rem; text-align: right; }
    .corner.bl { bottom: 2.5rem; left: 1rem; }
    .corner.br { bottom: 2.5rem; right: 1rem; text-align: right; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-marquee" id="marquee"></div>
  <div class="particles" id="particles"></div>

  <div class="corner tl">SYS::BOOT<br>v0.0.1α</div>
  <div class="corner tr">ERR: 404<br>NOT YET ♡</div>
  <div class="corner bl">██░░░░ 42%</div>
  <div class="corner br">pls wait... ☆</div>

  <div class="stage">
    <div class="hearts-row">♡ ♡ ♡ ♡ ♡</div>
    <div class="label">// initializing... //</div>
    <h1 class="title" data-text="coming soon">coming soon</h1>
    <div class="loading-wrap">
      <div class="loading-label">loading<span class="dots"></span></div>
      <div class="bar-outer"><div class="bar-inner"></div></div>
    </div>
  </div>

  <div class="notice">✦ &nbsp; something awesome is on its way &nbsp; ✦</div>

  <script>
    // scrolling bg marquee
    const marquee = document.getElementById('marquee');
    const phrase = 'coming soon ★ loading... ♡ please wait ✦ もうすぐ ★ ';
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('span');
      s.textContent = phrase.repeat(4);
      marquee.appendChild(s);
    }

    // floating particles
    const emojis = ['♡','✦','★','✿','♪','˖°','✧','☆','◌','*'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.6 + Math.random() * 1.2) + 'rem';
      p.style.animationDuration = (6 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.color = ['#ff6eb4','#d8aaff','#7fffd4','#fff176','#ff2d78'][Math.floor(Math.random()*5)];
      container.appendChild(p);
    }

    // click sparkles
    const sparkStyle = document.createElement('style');
    sparkStyle.textContent = `
      @keyframes spark-fly {
        from { opacity:1; transform: translate(0,0) scale(1); }
        to   { opacity:0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
      }
    `;
    document.head.appendChild(sparkStyle);

    document.addEventListener('click', (e) => {
      for (let i = 0; i < 7; i++) {
        const sp = document.createElement('div');
        sp.textContent = ['♡','✦','★','✧','˖'][Math.floor(Math.random()*5)];
        sp.style.cssText = `
          position:fixed; left:${e.clientX}px; top:${e.clientY}px;
          font-size:${0.7+Math.random()*0.9}rem;
          color:${['#ff6eb4','#d8aaff','#7fffd4','#fff176'][Math.floor(Math.random()*4)]};
          pointer-events:none; z-index:999; user-select:none;
          animation: spark-fly 0.75s ease forwards;
          --dx:${(Math.random()-0.5)*90}px;
          --dy:${-(15+Math.random()*65)}px;
        `;
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 800);
      }
    });
  </script>
</body>
</html>
